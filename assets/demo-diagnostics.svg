<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <defs>
    <filter id="shadow4">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.4"/>
    </filter>
  </defs>
  <style>
    @keyframes squigglyDraw {
      0%, 15% { opacity: 0; }
      25%, 100% { opacity: 1; }
    }
    @keyframes diagFade {
      0%, 30% { opacity: 0; }
      40%, 100% { opacity: 1; }
    }
    .mono4 { font-family: 'Cascadia Code', 'Fira Code', Consolas, monospace; }
    .sans4 { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; }
    .squiggly { animation: squigglyDraw 5s ease-out infinite; }
    .diagpanel { animation: diagFade 5s ease-out infinite; }
  </style>

  <!-- Window frame -->
  <rect width="800" height="400" rx="8" fill="#1e1e1e" filter="url(#shadow4)"/>

  <!-- Title bar -->
  <rect width="800" height="36" rx="8" fill="#323233"/>
  <rect y="28" width="800" height="8" fill="#323233"/>
  <circle cx="20" cy="18" r="6" fill="#ff5f57"/>
  <circle cx="40" cy="18" r="6" fill="#febc2e"/>
  <circle cx="60" cy="18" r="6" fill="#28c840"/>
  <rect x="80" y="6" width="160" height="30" rx="6" fill="#1e1e1e"/>
  <text x="110" y="26" class="sans4" font-size="12" fill="#cccccc">page.html</text>

  <!-- Line numbers -->
  <g class="mono4" font-size="13" fill="#858585">
    <text x="32" y="68" text-anchor="end">1</text>
    <text x="32" y="92" text-anchor="end">2</text>
    <text x="32" y="116" text-anchor="end">3</text>
    <text x="32" y="140" text-anchor="end">4</text>
    <text x="32" y="164" text-anchor="end">5</text>
    <text x="32" y="188" text-anchor="end">6</text>
  </g>

  <!-- Code lines -->
  <g class="mono4" font-size="13">
    <!-- Line 1: <div class="app"> -->
    <text x="60" y="68" fill="#808080">&lt;</text>
    <text x="68" y="68" fill="#569cd6">div</text>
    <text x="94" y="68" fill="#9cdcfe"> class</text>
    <text x="136" y="68" fill="#d4d4d4">=</text>
    <text x="144" y="68" fill="#ce9178">"app"</text>
    <text x="176" y="68" fill="#808080">&gt;</text>

    <!-- Line 2: <button hx-gett="/api" (TYPO) -->
    <text x="76" y="92" fill="#808080">&lt;</text>
    <text x="84" y="92" fill="#569cd6">button</text>
    <text x="136" y="92" fill="#e5c07b"> hx-gett</text>
    <text x="204" y="92" fill="#d4d4d4">=</text>
    <text x="212" y="92" fill="#ce9178">"/api/data"</text>
    <text x="296" y="92" fill="#808080">&gt;</text>

    <!-- Line 3: Load Data -->
    <text x="92" y="116" fill="#d4d4d4">Load Data</text>

    <!-- Line 4: </button> -->
    <text x="76" y="140" fill="#808080">&lt;/</text>
    <text x="92" y="140" fill="#569cd6">button</text>
    <text x="144" y="140" fill="#808080">&gt;</text>

    <!-- Line 5: <div hx-swap="badvalue"> -->
    <text x="76" y="164" fill="#808080">&lt;</text>
    <text x="84" y="164" fill="#569cd6">div</text>
    <text x="110" y="164" fill="#9cdcfe"> hx-swap</text>
    <text x="172" y="164" fill="#d4d4d4">=</text>
    <text x="180" y="164" fill="#e5c07b">"badvalue"</text>
    <text x="255" y="164" fill="#808080">&gt;&lt;/</text>
    <text x="281" y="164" fill="#569cd6">div</text>
    <text x="305" y="164" fill="#808080">&gt;</text>

    <!-- Line 6 -->
    <text x="60" y="188" fill="#808080">&lt;/</text>
    <text x="76" y="188" fill="#569cd6">div</text>
    <text x="100" y="188" fill="#808080">&gt;</text>
  </g>

  <!-- Yellow squiggly under hx-gett -->
  <g class="squiggly">
    <path d="M140,96 l3,-3 l3,3 l3,-3 l3,3 l3,-3 l3,3 l3,-3 l3,3 l3,-3 l3,3 l3,-3 l3,3 l3,-3 l3,3 l3,-3 l3,3 l3,-3 l3,3 l3,-3 l3,3" fill="none" stroke="#e5c07b" stroke-width="1.2"/>
  </g>

  <!-- Yellow squiggly under "badvalue" -->
  <g class="squiggly">
    <path d="M184,168 l3,-3 l3,3 l3,-3 l3,3 l3,-3 l3,3 l3,-3 l3,3 l3,-3 l3,3 l3,-3 l3,3 l3,-3 l3,3 l3,-3 l3,3 l3,-3 l3,3 l3,-3 l3,3 l3,-3 l3,3" fill="none" stroke="#f44747" stroke-width="1.2"/>
  </g>

  <!-- Diagnostic tooltip for hx-gett -->
  <g class="diagpanel">
    <rect x="120" y="100" width="430" height="52" rx="4" fill="#252526" stroke="#e5c07b" stroke-width="1" stroke-opacity="0.5" filter="url(#shadow4)"/>
    <!-- Warning icon -->
    <text x="134" y="122" class="sans4" font-size="14" fill="#e5c07b">&#9888;</text>
    <text x="152" y="122" class="sans4" font-size="12" fill="#cccccc">Unknown HTMX attribute </text>
    <text x="330" y="122" class="mono4" font-size="12" fill="#e5c07b">"hx-gett"</text>
    <text x="152" y="140" class="sans4" font-size="12" fill="#808080">Did you mean </text>
    <text x="250" y="140" class="mono4" font-size="12" fill="#3366CC">"hx-get"</text>
    <text x="306" y="140" class="sans4" font-size="12" fill="#808080">?</text>
    <text x="440" y="140" class="sans4" font-size="10" fill="#858585">htmx-intellisense</text>
  </g>

  <!-- Problems panel at bottom -->
  <g class="diagpanel">
    <!-- Panel background -->
    <rect x="0" y="215" width="800" height="167" fill="#1e1e1e"/>
    <!-- Panel header -->
    <rect x="0" y="215" width="800" height="28" fill="#252526"/>
    <text x="15" y="234" class="sans4" font-size="12" font-weight="bold" fill="#cccccc">PROBLEMS</text>
    <!-- Badge -->
    <rect x="95" y="222" width="16" height="16" rx="8" fill="#e5c07b"/>
    <text x="103" y="234" text-anchor="middle" class="sans4" font-size="10" fill="#1e1e1e" font-weight="bold">2</text>

    <!-- Separator -->
    <line x1="0" y1="243" x2="800" y2="243" stroke="#454545" stroke-width="1"/>

    <!-- Problem 1 -->
    <g>
      <text x="30" y="268" class="sans4" font-size="14" fill="#e5c07b">&#9888;</text>
      <text x="50" y="268" class="sans4" font-size="12" fill="#cccccc">Unknown HTMX attribute "hx-gett". Did you mean "hx-get"?</text>
      <text x="610" y="268" class="sans4" font-size="11" fill="#808080">htmx-intellisense</text>
      <text x="730" y="268" class="mono4" font-size="11" fill="#808080">[2, 9]</text>
    </g>

    <!-- Problem 2 -->
    <g>
      <text x="30" y="296" class="sans4" font-size="14" fill="#f44747">&#x2716;</text>
      <text x="50" y="296" class="sans4" font-size="12" fill="#cccccc">Invalid hx-swap value "badvalue". Expected: innerHTML, outerHTML, ...</text>
      <text x="610" y="296" class="sans4" font-size="11" fill="#808080">htmx-intellisense</text>
      <text x="730" y="296" class="mono4" font-size="11" fill="#808080">[5, 11]</text>
    </g>
  </g>

  <!-- Status bar -->
  <rect y="382" width="800" height="18" fill="#007acc"/>
  <text x="12" y="395" class="sans4" font-size="11" fill="#ffffff">HTML</text>
  <!-- Errors/warnings in status bar -->
  <text x="570" y="395" class="sans4" font-size="11" fill="#e5c07b">&#9888; 1</text>
  <text x="608" y="395" class="sans4" font-size="11" fill="#f44747">&#x2716; 1</text>
  <text x="720" y="395" class="sans4" font-size="11" fill="#ffffff">Ln 2, Col 9</text>
</svg>

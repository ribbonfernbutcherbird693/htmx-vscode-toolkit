<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" width="1280" height="640">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="50%" style="stop-color:#161b22"/>
      <stop offset="100%" style="stop-color:#0d1117"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3366CC"/>
      <stop offset="100%" style="stop-color:#5588ee"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3366CC;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#3366CC;stop-opacity:0"/>
    </linearGradient>
    <filter id="blur1">
      <feGaussianBlur in="SourceGraphic" stdDeviation="40"/>
    </filter>
    <filter id="blur2">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2"/>
    </filter>
  </defs>
  <style>
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes pulse { 0%, 100% { opacity: 0.15; } 50% { opacity: 0.3; } }
    .code-bg { fill: none; stroke: #3366CC; stroke-width: 0.5; opacity: 0.08; }
    .code-bg-bright { fill: none; stroke: #3366CC; stroke-width: 0.5; opacity: 0.15; }
  </style>

  <!-- Background -->
  <rect width="1280" height="640" fill="url(#bg)"/>

  <!-- Ambient glow -->
  <ellipse cx="640" cy="280" rx="500" ry="250" fill="#3366CC" opacity="0.06" filter="url(#blur1)"/>

  <!-- Grid pattern -->
  <g opacity="0.04" stroke="#3366CC" stroke-width="0.5">
    <line x1="0" y1="80" x2="1280" y2="80"/>
    <line x1="0" y1="160" x2="1280" y2="160"/>
    <line x1="0" y1="240" x2="1280" y2="240"/>
    <line x1="0" y1="320" x2="1280" y2="320"/>
    <line x1="0" y1="400" x2="1280" y2="400"/>
    <line x1="0" y1="480" x2="1280" y2="480"/>
    <line x1="0" y1="560" x2="1280" y2="560"/>
    <line x1="160" y1="0" x2="160" y2="640"/>
    <line x1="320" y1="0" x2="320" y2="640"/>
    <line x1="480" y1="0" x2="480" y2="640"/>
    <line x1="640" y1="0" x2="640" y2="640"/>
    <line x1="800" y1="0" x2="800" y2="640"/>
    <line x1="960" y1="0" x2="960" y2="640"/>
    <line x1="1120" y1="0" x2="1120" y2="640"/>
  </g>

  <!-- Decorative code fragments - left side -->
  <g font-family="'Cascadia Code', 'Fira Code', Consolas, monospace" font-size="13" opacity="0.12">
    <text x="60" y="120" fill="#569cd6">&lt;div</text>
    <text x="105" y="120" fill="#9cdcfe"> hx-get</text>
    <text x="165" y="120" fill="#d4d4d4">=</text>
    <text x="173" y="120" fill="#ce9178">"/api/data"</text>
    <text x="260" y="120" fill="#569cd6">&gt;</text>

    <text x="80" y="180" fill="#569cd6">&lt;form</text>
    <text x="130" y="180" fill="#9cdcfe"> hx-post</text>
    <text x="200" y="180" fill="#d4d4d4">=</text>
    <text x="208" y="180" fill="#ce9178">"/submit"</text>
    <text x="280" y="180" fill="#569cd6">&gt;</text>

    <text x="40" y="480" fill="#569cd6">&lt;div</text>
    <text x="85" y="480" fill="#9cdcfe"> hx-trigger</text>
    <text x="175" y="480" fill="#d4d4d4">=</text>
    <text x="183" y="480" fill="#ce9178">"load"</text>
    <text x="225" y="480" fill="#569cd6">&gt;</text>

    <text x="70" y="540" fill="#569cd6">&lt;button</text>
    <text x="140" y="540" fill="#9cdcfe"> hx-delete</text>
    <text x="225" y="540" fill="#d4d4d4">=</text>
    <text x="233" y="540" fill="#ce9178">"/item/1"</text>
    <text x="305" y="540" fill="#569cd6">&gt;</text>
  </g>

  <!-- Decorative code fragments - right side -->
  <g font-family="'Cascadia Code', 'Fira Code', Consolas, monospace" font-size="13" opacity="0.12">
    <text x="940" y="140" fill="#9cdcfe">hx-swap</text>
    <text x="1000" y="140" fill="#d4d4d4">=</text>
    <text x="1008" y="140" fill="#ce9178">"outerHTML"</text>

    <text x="980" y="200" fill="#9cdcfe">hx-target</text>
    <text x="1050" y="200" fill="#d4d4d4">=</text>
    <text x="1058" y="200" fill="#ce9178">"#results"</text>

    <text x="920" y="460" fill="#9cdcfe">hx-indicator</text>
    <text x="1020" y="460" fill="#d4d4d4">=</text>
    <text x="1028" y="460" fill="#ce9178">".spinner"</text>

    <text x="960" y="520" fill="#9cdcfe">hx-ext</text>
    <text x="1010" y="520" fill="#d4d4d4">=</text>
    <text x="1018" y="520" fill="#ce9178">"sse"</text>
  </g>

  <!-- Decorative angle brackets -->
  <text x="150" y="340" font-family="'Cascadia Code', monospace" font-size="80" fill="#3366CC" opacity="0.06">&lt;/&gt;</text>
  <text x="950" y="360" font-family="'Cascadia Code', monospace" font-size="80" fill="#3366CC" opacity="0.06">{...}</text>

  <!-- Main title: HTMX -->
  <text x="640" y="265" text-anchor="middle" font-family="'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif" font-size="120" font-weight="800" fill="white" letter-spacing="-2">
    HTMX
  </text>

  <!-- Accent line under HTMX -->
  <rect x="490" y="285" width="300" height="3" rx="1.5" fill="url(#accent)"/>

  <!-- Subtitle: IntelliSense -->
  <text x="640" y="345" text-anchor="middle" font-family="'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif" font-size="42" font-weight="300" fill="#8b949e" letter-spacing="8">
    IntelliSense
  </text>

  <!-- Tagline -->
  <text x="640" y="405" text-anchor="middle" font-family="'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif" font-size="18" fill="#58a6ff" letter-spacing="1">
    Completions . Hover Docs . Validation . Snippets
  </text>

  <!-- VS Code badge -->
  <g transform="translate(555, 440)">
    <rect width="170" height="34" rx="17" fill="#3366CC" opacity="0.15" stroke="#3366CC" stroke-width="1" stroke-opacity="0.3"/>
    <text x="85" y="22" text-anchor="middle" font-family="'Inter', 'Segoe UI', system-ui, sans-serif" font-size="13" fill="#58a6ff" letter-spacing="0.5">Visual Studio Code</text>
  </g>

  <!-- Bottom border accent -->
  <rect x="0" y="636" width="1280" height="4" fill="url(#accent)"/>
</svg>

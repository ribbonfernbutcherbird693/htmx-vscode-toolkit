<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <defs>
    <filter id="shadow2">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.4"/>
    </filter>
  </defs>
  <style>
    @keyframes dropdownFade2 {
      0%, 5% { opacity: 0; transform: translateY(-4px); }
      15%, 100% { opacity: 1; transform: translateY(0); }
    }
    @keyframes cursorBlink2 {
      0%, 49% { opacity: 1; }
      50%, 100% { opacity: 0; }
    }
    .mono2 { font-family: 'Cascadia Code', 'Fira Code', Consolas, monospace; }
    .sans2 { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; }
    .dropdown2 { animation: dropdownFade2 4s ease-out infinite; }
    .cursor2 { animation: cursorBlink2 1s step-end infinite; }
  </style>

  <!-- Window frame -->
  <rect width="800" height="400" rx="8" fill="#1e1e1e" filter="url(#shadow2)"/>

  <!-- Title bar -->
  <rect width="800" height="36" rx="8" fill="#323233"/>
  <rect y="28" width="800" height="8" fill="#323233"/>
  <circle cx="20" cy="18" r="6" fill="#ff5f57"/>
  <circle cx="40" cy="18" r="6" fill="#febc2e"/>
  <circle cx="60" cy="18" r="6" fill="#28c840"/>
  <rect x="80" y="6" width="160" height="30" rx="6" fill="#1e1e1e"/>
  <text x="110" y="26" class="sans2" font-size="12" fill="#cccccc">template.html</text>

  <!-- Line numbers -->
  <g class="mono2" font-size="13" fill="#858585">
    <text x="32" y="68" text-anchor="end">7</text>
    <text x="32" y="92" text-anchor="end">8</text>
    <text x="32" y="116" text-anchor="end">9</text>
    <text x="32" y="140" text-anchor="end">10</text>
  </g>

  <!-- Code lines -->
  <g class="mono2" font-size="13">
    <!-- Line 7 -->
    <text x="60" y="68" fill="#808080">&lt;</text>
    <text x="68" y="68" fill="#569cd6">div</text>
    <text x="94" y="68" fill="#9cdcfe"> id</text>
    <text x="114" y="68" fill="#d4d4d4">=</text>
    <text x="122" y="68" fill="#ce9178">"results"</text>
    <text x="190" y="68" fill="#808080">&gt;</text>

    <!-- Line 8 -->
    <text x="76" y="92" fill="#808080">&lt;</text>
    <text x="84" y="92" fill="#569cd6">button</text>

    <!-- Line 9: hx-get="/api" -->
    <text x="92" y="116" fill="#9cdcfe">hx-get</text>
    <text x="142" y="116" fill="#d4d4d4">=</text>
    <text x="150" y="116" fill="#ce9178">"/api/items"</text>

    <!-- Line 10: hx-swap=" (with cursor) -->
    <text x="92" y="140" fill="#9cdcfe">hx-swap</text>
    <text x="148" y="140" fill="#d4d4d4">=</text>
    <text x="156" y="140" fill="#ce9178">"</text>
    <!-- Cursor -->
    <rect x="163" y="128" width="2" height="16" fill="#aeafad" class="cursor2"/>
  </g>

  <!-- Current line highlight -->
  <rect x="48" y="127" width="752" height="22" fill="#ffffff" opacity="0.04"/>

  <!-- Completion dropdown for hx-swap values -->
  <g class="dropdown2">
    <rect x="130" y="150" width="400" height="230" rx="4" fill="#252526" stroke="#454545" stroke-width="1" filter="url(#shadow2)"/>

    <!-- Header -->
    <rect x="131" y="151" width="398" height="20" fill="#2d2d2d"/>
    <text x="145" y="165" class="sans2" font-size="10" fill="#808080">hx-swap values</text>

    <!-- Item 1: innerHTML (selected) -->
    <rect x="131" y="171" width="398" height="26" fill="#04395e"/>
    <rect x="142" y="176" width="14" height="14" rx="2" fill="#b180d7" opacity="0.3"/>
    <text x="166" y="189" class="mono2" font-size="12" fill="#ffffff">innerHTML</text>
    <text x="300" y="189" class="sans2" font-size="11" fill="#808080">Replace inner content (default)</text>

    <!-- Item 2: outerHTML -->
    <rect x="131" y="197" width="398" height="26" fill="transparent"/>
    <rect x="142" y="202" width="14" height="14" rx="2" fill="#b180d7" opacity="0.3"/>
    <text x="166" y="215" class="mono2" font-size="12" fill="#cccccc">outerHTML</text>
    <text x="300" y="215" class="sans2" font-size="11" fill="#808080">Replace entire element</text>

    <!-- Item 3: beforebegin -->
    <rect x="131" y="223" width="398" height="26" fill="transparent"/>
    <rect x="142" y="228" width="14" height="14" rx="2" fill="#b180d7" opacity="0.3"/>
    <text x="166" y="241" class="mono2" font-size="12" fill="#cccccc">beforebegin</text>
    <text x="300" y="241" class="sans2" font-size="11" fill="#808080">Insert before target</text>

    <!-- Item 4: afterbegin -->
    <rect x="131" y="249" width="398" height="26" fill="transparent"/>
    <rect x="142" y="254" width="14" height="14" rx="2" fill="#b180d7" opacity="0.3"/>
    <text x="166" y="267" class="mono2" font-size="12" fill="#cccccc">afterbegin</text>
    <text x="300" y="267" class="sans2" font-size="11" fill="#808080">Prepend inside target</text>

    <!-- Item 5: beforeend -->
    <rect x="131" y="275" width="398" height="26" fill="transparent"/>
    <rect x="142" y="280" width="14" height="14" rx="2" fill="#b180d7" opacity="0.3"/>
    <text x="166" y="293" class="mono2" font-size="12" fill="#cccccc">beforeend</text>
    <text x="300" y="293" class="sans2" font-size="11" fill="#808080">Append inside target</text>

    <!-- Item 6: afterend -->
    <rect x="131" y="301" width="398" height="26" fill="transparent"/>
    <rect x="142" y="306" width="14" height="14" rx="2" fill="#b180d7" opacity="0.3"/>
    <text x="166" y="319" class="mono2" font-size="12" fill="#cccccc">afterend</text>
    <text x="300" y="319" class="sans2" font-size="11" fill="#808080">Insert after target</text>

    <!-- Item 7: delete -->
    <rect x="131" y="327" width="398" height="26" fill="transparent"/>
    <rect x="142" y="332" width="14" height="14" rx="2" fill="#b180d7" opacity="0.3"/>
    <text x="166" y="345" class="mono2" font-size="12" fill="#cccccc">delete</text>
    <text x="300" y="345" class="sans2" font-size="11" fill="#808080">Remove target element</text>

    <!-- Item 8: none -->
    <rect x="131" y="353" width="398" height="26" fill="transparent"/>
    <rect x="142" y="358" width="14" height="14" rx="2" fill="#b180d7" opacity="0.3"/>
    <text x="166" y="371" class="mono2" font-size="12" fill="#cccccc">none</text>
    <text x="300" y="371" class="sans2" font-size="11" fill="#808080">No swap, only side effects</text>

    <!-- Scrollbar -->
    <rect x="525" y="172" width="4" height="206" rx="2" fill="#333"/>
    <rect x="525" y="172" width="4" height="100" rx="2" fill="#555"/>
  </g>

  <!-- Status bar -->
  <rect y="382" width="800" height="18" fill="#007acc"/>
  <text x="12" y="395" class="sans2" font-size="11" fill="#ffffff">HTML</text>
  <text x="720" y="395" class="sans2" font-size="11" fill="#ffffff">Ln 10, Col 12</text>
</svg>

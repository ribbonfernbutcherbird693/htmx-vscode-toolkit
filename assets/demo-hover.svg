<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <defs>
    <filter id="shadow3">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.4"/>
    </filter>
  </defs>
  <style>
    @keyframes tooltipFade {
      0%, 20% { opacity: 0; transform: translateY(4px); }
      30%, 100% { opacity: 1; transform: translateY(0); }
    }
    @keyframes hoverHighlight {
      0%, 20% { fill: #9cdcfe; }
      30%, 100% { fill: #4fc1ff; }
    }
    .mono3 { font-family: 'Cascadia Code', 'Fira Code', Consolas, monospace; }
    .sans3 { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; }
    .tooltip3 { animation: tooltipFade 5s ease-out infinite; }
    .hovered { animation: hoverHighlight 5s ease-out infinite; }
  </style>

  <!-- Window frame -->
  <rect width="800" height="400" rx="8" fill="#1e1e1e" filter="url(#shadow3)"/>

  <!-- Title bar -->
  <rect width="800" height="36" rx="8" fill="#323233"/>
  <rect y="28" width="800" height="8" fill="#323233"/>
  <circle cx="20" cy="18" r="6" fill="#ff5f57"/>
  <circle cx="40" cy="18" r="6" fill="#febc2e"/>
  <circle cx="60" cy="18" r="6" fill="#28c840"/>
  <rect x="80" y="6" width="160" height="30" rx="6" fill="#1e1e1e"/>
  <text x="110" y="26" class="sans3" font-size="12" fill="#cccccc">form.html</text>

  <!-- Line numbers -->
  <g class="mono3" font-size="13" fill="#858585">
    <text x="32" y="68" text-anchor="end">3</text>
    <text x="32" y="92" text-anchor="end">4</text>
    <text x="32" y="116" text-anchor="end">5</text>
    <text x="32" y="140" text-anchor="end">6</text>
  </g>

  <!-- Code lines -->
  <g class="mono3" font-size="13">
    <!-- Line 3 -->
    <text x="60" y="68" fill="#808080">&lt;</text>
    <text x="68" y="68" fill="#569cd6">form</text>
    <text x="100" y="68" fill="#9cdcfe"> hx-post</text>
    <text x="164" y="68" fill="#d4d4d4">=</text>
    <text x="172" y="68" fill="#ce9178">"/api/submit"</text>
    <text x="268" y="68" fill="#808080">&gt;</text>

    <!-- Line 4: with hx-trigger (hovered) -->
    <text x="76" y="92" fill="#808080">&lt;</text>
    <text x="84" y="92" fill="#569cd6">input</text>
    <text x="124" y="92" fill="#4fc1ff" class="hovered"> hx-trigger</text>
    <text x="216" y="92" fill="#d4d4d4">=</text>
    <text x="224" y="92" fill="#ce9178">"keyup changed delay:300ms"</text>
    <text x="452" y="92" fill="#808080">/&gt;</text>

    <!-- Hover underline on hx-trigger -->
    <rect x="130" y="95" width="82" height="1" fill="#4fc1ff" opacity="0.6"/>

    <!-- Line 5 -->
    <text x="76" y="116" fill="#808080">&lt;</text>
    <text x="84" y="116" fill="#569cd6">div</text>
    <text x="108" y="116" fill="#9cdcfe"> hx-target</text>
    <text x="188" y="116" fill="#d4d4d4">=</text>
    <text x="196" y="116" fill="#ce9178">"#results"</text>
    <text x="270" y="116" fill="#808080">&gt;&lt;/</text>
    <text x="296" y="116" fill="#569cd6">div</text>
    <text x="320" y="116" fill="#808080">&gt;</text>

    <!-- Line 6 -->
    <text x="60" y="140" fill="#808080">&lt;/</text>
    <text x="76" y="140" fill="#569cd6">form</text>
    <text x="108" y="140" fill="#808080">&gt;</text>
  </g>

  <!-- Hover tooltip -->
  <g class="tooltip3">
    <rect x="100" y="105" width="560" height="265" rx="4" fill="#252526" stroke="#454545" stroke-width="1" filter="url(#shadow3)"/>

    <!-- Tooltip title -->
    <text x="120" y="130" class="mono3" font-size="14" font-weight="bold" fill="#569cd6">hx-trigger</text>

    <!-- Separator -->
    <line x1="115" y1="140" x2="645" y2="140" stroke="#454545" stroke-width="1"/>

    <!-- Description -->
    <text x="120" y="160" class="sans3" font-size="12" fill="#cccccc">Specifies the event that triggers the request. Can include modifiers for</text>
    <text x="120" y="176" class="sans3" font-size="12" fill="#cccccc">debouncing, throttling, filtering, and more.</text>

    <!-- Values section -->
    <text x="120" y="202" class="sans3" font-size="12" font-weight="bold" fill="#9cdcfe">Events:</text>
    <text x="120" y="220" class="mono3" font-size="11" fill="#ce9178">click</text>
    <text x="168" y="220" class="sans3" font-size="11" fill="#808080"> | </text>
    <text x="180" y="220" class="mono3" font-size="11" fill="#ce9178">submit</text>
    <text x="238" y="220" class="sans3" font-size="11" fill="#808080"> | </text>
    <text x="250" y="220" class="mono3" font-size="11" fill="#ce9178">change</text>
    <text x="312" y="220" class="sans3" font-size="11" fill="#808080"> | </text>
    <text x="324" y="220" class="mono3" font-size="11" fill="#ce9178">keyup</text>
    <text x="374" y="220" class="sans3" font-size="11" fill="#808080"> | </text>
    <text x="386" y="220" class="mono3" font-size="11" fill="#ce9178">load</text>
    <text x="424" y="220" class="sans3" font-size="11" fill="#808080"> | </text>
    <text x="436" y="220" class="mono3" font-size="11" fill="#ce9178">revealed</text>
    <text x="506" y="220" class="sans3" font-size="11" fill="#808080"> | </text>
    <text x="518" y="220" class="mono3" font-size="11" fill="#ce9178">intersect</text>

    <!-- Modifiers section -->
    <text x="120" y="246" class="sans3" font-size="12" font-weight="bold" fill="#9cdcfe">Modifiers:</text>
    <text x="120" y="264" class="mono3" font-size="11" fill="#dcdcaa">once</text>
    <text x="156" y="264" class="sans3" font-size="11" fill="#808080"> | </text>
    <text x="168" y="264" class="mono3" font-size="11" fill="#dcdcaa">changed</text>
    <text x="230" y="264" class="sans3" font-size="11" fill="#808080"> | </text>
    <text x="242" y="264" class="mono3" font-size="11" fill="#dcdcaa">delay:</text>
    <text x="290" y="264" class="sans3" font-size="11" fill="#808080"> | </text>
    <text x="302" y="264" class="mono3" font-size="11" fill="#dcdcaa">throttle:</text>
    <text x="370" y="264" class="sans3" font-size="11" fill="#808080"> | </text>
    <text x="382" y="264" class="mono3" font-size="11" fill="#dcdcaa">from:</text>
    <text x="422" y="264" class="sans3" font-size="11" fill="#808080"> | </text>
    <text x="434" y="264" class="mono3" font-size="11" fill="#dcdcaa">target:</text>

    <!-- Example -->
    <text x="120" y="290" class="sans3" font-size="12" font-weight="bold" fill="#9cdcfe">Example:</text>
    <rect x="120" y="298" width="380" height="22" rx="3" fill="#1e1e1e"/>
    <text x="130" y="314" class="mono3" font-size="11" fill="#ce9178">"keyup changed delay:500ms from:body"</text>

    <!-- Docs link -->
    <text x="120" y="346" class="sans3" font-size="11" fill="#3366CC">htmx.org/attributes/hx-trigger</text>
    <line x1="120" y1="348" x2="310" y2="348" stroke="#3366CC" stroke-width="0.5"/>
  </g>

  <!-- Status bar -->
  <rect y="382" width="800" height="18" fill="#007acc"/>
  <text x="12" y="395" class="sans3" font-size="11" fill="#ffffff">HTML</text>
  <text x="720" y="395" class="sans3" font-size="11" fill="#ffffff">Ln 4, Col 18</text>
</svg>

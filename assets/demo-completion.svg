<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <defs>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.4"/>
    </filter>
  </defs>
  <style>
    @keyframes dropdownFade {
      0%, 25% { opacity: 0; transform: translateY(-4px); }
      35%, 100% { opacity: 1; transform: translateY(0); }
    }
    @keyframes cursorBlink {
      0%, 49% { opacity: 1; }
      50%, 100% { opacity: 0; }
    }
    @keyframes typeIn {
      0%, 10% { width: 0; }
      20%, 100% { width: 24px; }
    }
    .mono { font-family: 'Cascadia Code', 'Fira Code', Consolas, monospace; }
    .sans { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; }
    .dropdown { animation: dropdownFade 4s ease-out infinite; }
    .cursor { animation: cursorBlink 1s step-end infinite; }
  </style>

  <!-- Window frame -->
  <rect width="800" height="400" rx="8" fill="#1e1e1e" filter="url(#shadow)"/>

  <!-- Title bar -->
  <rect width="800" height="36" rx="8" fill="#323233"/>
  <rect y="28" width="800" height="8" fill="#323233"/>
  <!-- Window dots -->
  <circle cx="20" cy="18" r="6" fill="#ff5f57"/>
  <circle cx="40" cy="18" r="6" fill="#febc2e"/>
  <circle cx="60" cy="18" r="6" fill="#28c840"/>
  <!-- Tab -->
  <rect x="80" y="6" width="160" height="30" rx="6" fill="#1e1e1e"/>
  <text x="110" y="26" class="sans" font-size="12" fill="#cccccc">index.html</text>

  <!-- Line numbers gutter -->
  <rect x="0" y="36" width="48" height="364" fill="#1e1e1e"/>

  <!-- Line numbers -->
  <g class="mono" font-size="13" fill="#858585">
    <text x="32" y="68" text-anchor="end">1</text>
    <text x="32" y="92" text-anchor="end">2</text>
    <text x="32" y="116" text-anchor="end">3</text>
    <text x="32" y="140" text-anchor="end">4</text>
    <text x="32" y="164" text-anchor="end">5</text>
  </g>

  <!-- Code lines -->
  <g class="mono" font-size="13">
    <!-- Line 1: <div class="container"> -->
    <text x="60" y="68" fill="#808080">&lt;</text>
    <text x="68" y="68" fill="#569cd6">div</text>
    <text x="94" y="68" fill="#9cdcfe"> class</text>
    <text x="136" y="68" fill="#d4d4d4">=</text>
    <text x="144" y="68" fill="#ce9178">"container"</text>
    <text x="228" y="68" fill="#808080">&gt;</text>

    <!-- Line 2: <section id="content"> -->
    <text x="76" y="92" fill="#808080">&lt;</text>
    <text x="84" y="92" fill="#569cd6">section</text>
    <text x="140" y="92" fill="#9cdcfe"> id</text>
    <text x="162" y="92" fill="#d4d4d4">=</text>
    <text x="170" y="92" fill="#ce9178">"content"</text>
    <text x="238" y="92" fill="#808080">&gt;</text>

    <!-- Line 3: <div hx- (with cursor) -->
    <text x="92" y="116" fill="#808080">&lt;</text>
    <text x="100" y="116" fill="#569cd6">div</text>
    <text x="126" y="116" fill="#9cdcfe"> hx-</text>
    <!-- Cursor -->
    <rect x="153" y="104" width="2" height="16" fill="#aeafad" class="cursor"/>
  </g>

  <!-- Current line highlight -->
  <rect x="48" y="103" width="752" height="22" fill="#ffffff" opacity="0.04"/>

  <!-- Completion dropdown -->
  <g class="dropdown">
    <rect x="120" y="126" width="380" height="218" rx="4" fill="#252526" stroke="#454545" stroke-width="1" filter="url(#shadow)"/>

    <!-- Dropdown items -->
    <!-- Item 1: hx-get (selected) -->
    <rect x="121" y="127" width="378" height="26" fill="#04395e"/>
    <text x="140" y="145" class="mono" font-size="12" fill="#569cd6">&#xea8c;</text>
    <text x="156" y="145" class="mono" font-size="12" fill="#ffffff">hx-get</text>
    <text x="280" y="145" class="sans" font-size="11" fill="#808080">Issues a GET request</text>

    <!-- Item 2: hx-post -->
    <rect x="121" y="153" width="378" height="26" fill="transparent"/>
    <text x="156" y="171" class="mono" font-size="12" fill="#cccccc">hx-post</text>
    <text x="280" y="171" class="sans" font-size="11" fill="#808080">Issues a POST request</text>

    <!-- Item 3: hx-put -->
    <rect x="121" y="179" width="378" height="26" fill="transparent"/>
    <text x="156" y="197" class="mono" font-size="12" fill="#cccccc">hx-put</text>
    <text x="280" y="197" class="sans" font-size="11" fill="#808080">Issues a PUT request</text>

    <!-- Item 4: hx-target -->
    <rect x="121" y="205" width="378" height="26" fill="transparent"/>
    <text x="156" y="223" class="mono" font-size="12" fill="#cccccc">hx-target</text>
    <text x="280" y="223" class="sans" font-size="11" fill="#808080">Specifies target element</text>

    <!-- Item 5: hx-swap -->
    <rect x="121" y="231" width="378" height="26" fill="transparent"/>
    <text x="156" y="249" class="mono" font-size="12" fill="#cccccc">hx-swap</text>
    <text x="280" y="249" class="sans" font-size="11" fill="#808080">Controls swap strategy</text>

    <!-- Item 6: hx-trigger -->
    <rect x="121" y="257" width="378" height="26" fill="transparent"/>
    <text x="156" y="275" class="mono" font-size="12" fill="#cccccc">hx-trigger</text>
    <text x="280" y="275" class="sans" font-size="11" fill="#808080">Specifies triggering event</text>

    <!-- Item 7: hx-boost -->
    <rect x="121" y="283" width="378" height="26" fill="transparent"/>
    <text x="156" y="301" class="mono" font-size="12" fill="#cccccc">hx-boost</text>
    <text x="280" y="301" class="sans" font-size="11" fill="#808080">Progressive enhancement</text>

    <!-- Item 8: hx-indicator -->
    <rect x="121" y="309" width="378" height="26" fill="transparent"/>
    <text x="156" y="327" class="mono" font-size="12" fill="#cccccc">hx-indicator</text>
    <text x="280" y="327" class="sans" font-size="11" fill="#808080">Loading indicator element</text>

    <!-- Completion icons (property icon) -->
    <g fill="#569cd6" font-size="11" class="sans">
      <rect x="132" y="132" width="14" height="14" rx="2" fill="#2a5a8a" opacity="0.5"/>
      <rect x="132" y="158" width="14" height="14" rx="2" fill="#2a5a8a" opacity="0.5"/>
      <rect x="132" y="184" width="14" height="14" rx="2" fill="#2a5a8a" opacity="0.5"/>
      <rect x="132" y="210" width="14" height="14" rx="2" fill="#2a5a8a" opacity="0.5"/>
      <rect x="132" y="236" width="14" height="14" rx="2" fill="#2a5a8a" opacity="0.5"/>
      <rect x="132" y="262" width="14" height="14" rx="2" fill="#2a5a8a" opacity="0.5"/>
      <rect x="132" y="288" width="14" height="14" rx="2" fill="#2a5a8a" opacity="0.5"/>
      <rect x="132" y="314" width="14" height="14" rx="2" fill="#2a5a8a" opacity="0.5"/>
    </g>

    <!-- Scrollbar -->
    <rect x="495" y="128" width="4" height="216" rx="2" fill="#333"/>
    <rect x="495" y="128" width="4" height="80" rx="2" fill="#555"/>
  </g>

  <!-- Status bar -->
  <rect y="382" width="800" height="18" fill="#007acc"/>
  <text x="12" y="395" class="sans" font-size="11" fill="#ffffff">HTML</text>
  <text x="720" y="395" class="sans" font-size="11" fill="#ffffff">Ln 3, Col 14</text>
</svg>
